name: SIL Campaign Artifacts

on:
  workflow_dispatch:
    inputs:
      profile:
        description: "Campaign profile"
        required: true
        default: "smoke"
        type: choice
        options:
          - smoke
          - default
      repeats:
        description: "Campaign repeats"
        required: true
        default: "1"
      strict_readiness:
        description: "Enable strict readiness"
        required: true
        default: false
        type: boolean

jobs:
  run-campaign:
    runs-on: [self-hosted, windows]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install requests robotframework

      - name: Run campaign
        shell: pwsh
        run: |
          $strictArgs = @()
          if ("${{ inputs.strict_readiness }}" -eq "true") { $strictArgs = @("--strict-readiness") }
          python tools/testing/run_sil_campaign_webapi.py --profile "${{ inputs.profile }}" --repeats "${{ inputs.repeats }}" @strictArgs

      - name: Build artifact bundle
        shell: pwsh
        run: |
          $bundle = "logs/artifacts_ci"
          New-Item -ItemType Directory -Path $bundle -Force | Out-Null

          $latest = Get-ChildItem logs/sil_campaign -Directory | Sort-Object Name | Select-Object -Last 1
          if (-not $latest) {
            Write-Host "No campaign run directory found"
            exit 1
          }

          Copy-Item "$($latest.FullName)/campaign_summary.json" "$bundle/campaign_summary.json" -Force
          Copy-Item "$($latest.FullName)/campaign_summary.md" "$bundle/campaign_summary.md" -Force

          Get-ChildItem "$($latest.FullName)/*.jsonl" |
            Sort-Object Name |
            Select-Object -First 20 |
            ForEach-Object { Copy-Item $_.FullName "$bundle/$($_.Name)" -Force }

      - name: Upload campaign artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sil-campaign-artifacts
          path: logs/artifacts_ci
          if-no-files-found: error
